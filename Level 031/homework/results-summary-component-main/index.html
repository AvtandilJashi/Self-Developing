<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 4</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parent">
      <div class="child1">
        <h2>Your Result</h2>

        <div class="circle">
          <h1>76</h1>

          <p>of 100</p>
        </div>

        <h3>Great</h3>

        <p>You scored higher than 65% of <br> the people who have taken <br> these tests.
        </p>
      </div>

      <div class="child2">
        <h4>Summary</h4>

        <div class="alldiv">
          <div class="div1 same">
            <div>
              <img src="img1.svg" alt="">
              <p class="red">Reaction</p>
            </div>
            <div class="div1">
              <p>80 <span>/ 100</span></p>
            </div>
          </div>
          <div class="div2 same">
            <div>
              <img src="img2.svg" alt="">
              <p class="yellow">Memory</p>
            </div>
            <div>
              <p>92 <span>/ 100</span></p>
            </div>
          </div>
          <div class="div3 same">
            <div>
              <img src="img3.svg" alt="">
              <p class="green">Verbal</p>
            </div>
            <div>
              <p>61 <span>/ 100</span></p>
            </div>
          </div>
          <div class="div4 same">
            <div>
              <img src="img4.svg" alt="">
              <p class="blue">Visual</p>
            </div>
            <div>
              <p>73 <span>/ 100</span></p>
            </div>
          </div>
        </div>
      
      <button>Continue</button>
      </div>
    </div>
  
</body>
</html>
